<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzzStore</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef5ff;
color:#333;
}

.hero{
position:relative;
height:400px;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
}

.logo{
font-size:55px;
font-weight:bold;
background:linear-gradient(45deg,#6dd5fa,#4facfe,#1e3c72);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
filter:drop-shadow(0 0 5px #4facfe);
}
to{
filter:drop-shadow(0 0 20px #6dd5fa);
}
}

.overlay p{
margin-top:10px;
font-size:18px;
color:white;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
color:#1e3c72;
}

.price{
font-size:35px;
font-weight:bold;
color:#007bff;
margin:15px 0;
}

.wa-btn{
display:inline-block;
margin-top:15px;
background:#25D366;
color:white;
text-decoration:none;
padding:12px 24px;
border-radius:50px;
font-weight:bold;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(37,211,102,.7);
}
70%{
box-shadow:0 0 0 15px rgba(37,211,102,0);
}
100%{
box-shadow:0 0 0 0 rgba(37,211,102,0);
}
}

.payment{
margin-top:40px;
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.payment h2{
color:#1e3c72;
margin-bottom:10px;
}

footer{
margin-top:40px;
background:#1e3c72;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>
<body>

<div class="hero">

<video autoplay muted loop playsinline>
<source src="anime.mp4" type="video/mp4">
</video>

<div class="overlay">
<div class="logo">⚡ AzzStore</div>
<p>Alight Motion Premium Murah & Terpercaya</p>
</div>

</div>

<div class="container">

<div class="products">

<div class="card">
<h2>Alight Motion Pro</h2>
<div class="price">Rp10.000</div>
<p>Durasi 1 Bulan</p>

<a href="https://wa.me/6285800482426?text=Halo%20kak,%20saya%20tertarik%20beli%20AM%201%20bulan.%20Masih%20ready%3F"
target="_blank"
class="wa-btn">
📱 Order Sekarang
</a>
</div>

<div class="card">
<h2>Alight Motion Share</h2>
<div class="price">Rp5.000</div>
<p>Durasi 1 Bulan</p>

<a href="https://wa.me/6285800482426?text=Halo%20kak,%20saya%20tertarik%20beli%20AM%201%20bulan.%20Masih%20ready%3F"
target="_blank"
class="wa-btn">
📱 Order Sekarang
</a>
</div>

</div>

<div class="payment">
<h2>💳 Metode Pembayaran</h2>
<p><b>Gopay:</b> 085800482426</p>
<p><b>DANA:</b> 085800482426</p>
</div>

</div>

<footer>
© 2026 AzzStore | Fast Response • Trusted Seller
</footer>

</body>
</html>
